<!DOCTYPE html>
<html>
<head>
    <title>Attendance Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center" style="height:100vh; background:#f8f9fa;">

<div class="card shadow p-4 text-center" style="width: 350px; border-radius:15px;">
    
    {% if status == "Success" %}
        <h4 class="text-success">✅ Attendance Recorded</h4>
    {% else %}
        <h4 class="text-warning">⚠ {{ status }}</h4>
    {% endif %}

    <p class="mt-3"><strong>Machine:</strong> {{ machine }}</p>
    <p><strong>Time:</strong> {{ current_time }}</p>

</div>

</body>
</html>
