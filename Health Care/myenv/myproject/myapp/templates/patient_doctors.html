{% extends "header.html" %}
{% load static %}
{% block content %}
  

<!-- Auto Scroll Script -->
<script>
    window.onload = function () {
        const section = document.getElementById("newpass-section");
        if(section){
            section.scrollIntoView({ behavior: "smooth", block: "start" });
        }
    }
</script>

<section id="newpass-section" class="contact_section layout_padding" 
         >
    
    <div class="container">
        
    <div class="heading_container heading_center">
      <h2>Our Doctors</h2>
      <p class="col-md-10 mx-auto px-0">
        They descend with the wise man, by whom the present duties of those who praise us...
      </p>
    </div>

    <div class="doctor-scroll">
      {% for i in doctor %}
      <div class="doctor-card">
        <div class="img-box">
          <a href="{% url 'patient_doctor_details' pk=i.pk %}"><img src="{{i.dimage.url}}" alt=""></a>
        </div>
        <div class="detail-box">
          <div class="social_box">
            <a href=""><i class="fa fa-facebook"></i></a>
            <a href=""><i class="fa fa-twitter"></i></a>
            <a href=""><i class="fa fa-youtube"></i></a>
            <a href=""><i class="fa fa-linkedin"></i></a>
          </div>
          <h5>Doctor name: {{i.dname}}</h5>
          <h6>Category: {{i.cchoice}}</h6>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<!-- end doctor section -->

<style>
.doctor-scroll {
  display: flex;
  overflow-x: auto;
  gap: 20px;
  scroll-behavior: smooth;
  padding: 20px 0;
}

.doctor-scroll::-webkit-scrollbar {
  height: 8px;
}

.doctor-scroll::-webkit-scrollbar-thumb {
  background-color: #888;
  border-radius: 10px;
}

.doctor-scroll::-webkit-scrollbar-thumb:hover {
  background-color: #555;
}

.doctor-card {
  flex: 0 0 auto;
  width: 300px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.3s ease;
}

.doctor-card:hover {
  transform: scale(1.05);
}

.doctor-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 15px 15px 0 0;
}
</style>


{% endblock %}
