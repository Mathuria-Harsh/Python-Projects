{% extends "header.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <img src="{{ product.image.url }}" class="img-fluid rounded shadow">
        </div>

        <div class="col-md-7">
            <h2>{{ product.name }}</h2>
            <p>{{ product.description }}</p>
            <h4>Price: ₹{{ product.price }}</h4>

            <div style="display:flex; gap:12px; justify-content:center; margin-top:10px;">
                <button id="rzp-button1" onclick="payNow()" type="submit" style="padding:10px 16px; border-radius:10px; border:none; background:#2b8cff; color:#fff; font-weight:600; cursor:pointer; box-shadow:0 6px 16px rgba(43,140,255,0.18);">Book Appointment</button>
                
                <form id="payment_success_form" method="POST" action="{% url 'product_payment_success' %}" style="display: none;">
                    {% csrf_token %}
                    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
                    <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
                    <input type="hidden" name="razorpay_signature" id="razorpay_signature_input">
                    <input type="hidden" name="product_id" value="{{ product.id }}">

                </form>
            </div>

            
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function payNow() {

    var options = {
        "key": "rzp_test_Rfb2ETT6LpCRJ7",
        "amount": "{{ payment.amount }}",
        "currency": "INR",
        "name": "health-care",
        "description": "Test Payment",
        "order_id": "{{ order_id }}", 
        "handler": function (response) {
            
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
            document.getElementById('razorpay_signature_input').value = response.razorpay_signature;

            document.getElementById('payment_success_form').submit();
        },
        "theme": {
            "color": "#94CA21"
        }
    };

    var rzp1 = new Razorpay(options);

    rzp1.on('payment.failed', function (response) {
        alert(response.error.description);
    });

    rzp1.open();  // <<---- Ye important tha
}
</script>


{% endblock %}
