{% extends "dheader.html" %}
{% load static %}
{% block content %}

<section class="contact_section layout_padding">
  <div class="container">
    

    <!-- ✅ Success / Error Message -->
    {% if msg_error %}
      <div class="alert alert-danger text-center" role="alert" style="padding: 15px;">
        {{ msg_error }}
      </div>
    {% elif msg_success %}
      <div class="alert alert-success text-center" role="alert" style="padding: 15px;">
        {{ msg_success }}
      </div>
    {% endif %}

    <div class="row justify-content-center mt-4">
      <div class="col-md-8">
        <div class="form_container contact-form shadow p-4 rounded" style="background: #f9f9f9;">
          
          <form class="form-contact contact_form" action="{% url 'doctor_profile' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group text-center" style="font-weight:bold;" >
              <h2>PROFILE</h2>
            </div>
            <!-- ✅ USER TYPE with custom CSS -->
            <div class="form-group mb-3">
              <label for="usertype" style="font-weight:600;">User Type</label>
              <input 
                class="form-control" 
                name="usertype" 
                id="usertype" 
                type="text" 
                value="{{ doctor.doctor.usertype }}" 
                readonly 
                style="background-color: #eef3ff; border: 1px solid #b3c6ff; color:#003366; font-weight:500;"
              >
            </div>

            <!-- ✅ NAME -->
            <div class="form-group mb-3">
              <label for="name" style="font-weight:600;">Name</label>
              <input 
                class="form-control" 
                name="name" 
                id="name" 
                type="text" 
                placeholder="Enter your name" 
                value="{{ doctor.doctor.name }}" 
                required>
            </div>

            <!-- ✅ EMAIL -->
            <div class="form-group mb-3">
              <label for="email" style="font-weight:600;">Email</label>
              <input 
                class="form-control" 
                name="email" 
                id="email" 
                type="email" 
                value="{{ doctor.doctor.email }}" 
                readonly 
                required>
            </div>

            <!-- ✅ MOBILE -->
            <div class="form-group mb-4">
              <label for="mno" style="font-weight:600;">Mobile Number</label>
              <input 
                class="form-control" 
                name="mno" 
                id="mno" 
                type="tel" 
                value="{{ doctor.doctor.mno }}" 
                readonly 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="cchoice" style="font-weight:600;">Category</label>
              <input 
                class="form-control" 
                name="cchoice" 
                id="cchoice" 
                type="text" 
                placeholder="Enter your Category" 
                value="{{ doctor.cchoice }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="qfc" style="font-weight:600;">Qualification</label>
              <input 
                class="form-control" 
                name="qfc" 
                id="qfc" 
                type="text" 
                placeholder="Enter your Qualification" 
                value="{{ doctor.qfc }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="exp" style="font-weight:600;">Experience</label>
              <input 
                class="form-control" 
                name="exp" 
                id="exp" 
                type="text" 
                placeholder="Enter your Experience" 
                value="{{ doctor.exp }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="charges" style="font-weight:600;">Charge</label>
              <input 
                class="form-control" 
                name="charges" 
                id="charges" 
                type="text" 
                placeholder="Enter your Charges" 
                value="{{ doctor.charges }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="address" style="font-weight:600;">Address</label>
              <input 
                class="form-control" 
                name="address" 
                id="address" 
                type="text" 
                placeholder="Enter your Address" 
                value="{{ doctor.address }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="start_time" style="font-weight:600;">Start Time</label>
              <input 
                class="form-control" 
                name="start_time" 
                id="start_time" 
                type="time" 
                placeholder="Enter your Start Time" 
                value="{{ doctor.start_time|time:'H:i' }}" 
                required>
            </div>

            <div class="form-group mb-3">
              <label for="end_time" style="font-weight:600;">End time</label>
              <input 
                class="form-control" 
                name="end_time" 
                id="end_time" 
                type="time" 
                placeholder="Enter your End time" 
                value="{{ doctor.end_time|time:'H:i' }}" 
                required>
            </div>





            <!--  PROFILE IMAGE PREVIEW + UPDATE -->
            <div class="text-center mb-3">
              {% if doctor.dimage %}
                <img 
                  id="preview" 
                  src="{{ doctor.dimage.url }}" 
                  alt="Profile Image" 
                  height="120px" 
                  style="border-radius:50%; border:2px solid #ccc; object-fit:cover;">
              {% else %}
                <img 
                  id="preview" 
                  src="{% static 'images/default-avatar.png' %}" 
                  alt="Default Image" 
                  height="120px" 
                  style="border-radius:50%; border:2px solid #ccc;">
              {% endif %}
            </div>

            <div class="form-group text-center mb-4">
              <input 
                class="form-control" 
                name="dimage" 
                type="file" 
                accept="image/*"
                onchange="previewImage(event)" 
                style="max-width:250px; margin:auto;">
            </div>

            <!-- ✅ SUBMIT -->
            <div class="form-group text-center">
              <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 8px;">
                Update Profile
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</section>

<!-- ✅ Preview Script -->
<script>
function previewImage(event) {
  var reader = new FileReader();
  reader.onload = function() {
    var output = document.getElementById('preview');
    output.src = reader.result;
  }
  reader.readAsDataURL(event.target.files[0]);
}
</script>

{% endblock %}
