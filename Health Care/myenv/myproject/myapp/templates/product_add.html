{% extends "dheader.html" %}
{% block content %}

<div class="container mt-5">
    <h2>Add Product</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group mb-3">
            <input type="text" name="name" placeholder="Enter Product Name" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <input type="number" name="price" placeholder="Enter Price in ₹" class="form-control" min="0" required>
        </div>

        <div class="form-group mb-3">
            <textarea name="description" class="form-control" placeholder="Enter a short description" rows="4"></textarea>
        </div>

        <div class="form-group mb-3">
            <input type="file" name="image" class="form-control" required>
        </div>

        <div class="form-group text-center">
            <button class="btn btn-primary px-4">Add Product</button>
        </div>
    </form>
</div>

{% endblock %}
